name: CI
on:
  push: { branches: [main], tags: ['v*'] }
  pull_request:
jobs:
  backend:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: { os: [ubuntu-latest, macos-latest], python: ["3.11", "3.12"] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python }}" }
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -q --ignore=tests/test_e2e_smoke.py --ignore=tests/test_e2e_ws.py
        env: { OPENAI_API_KEY: sk-test, HERMES_SUBCONSCIOUS: off }
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd desktop && npm ci && npx tsc --noEmit && npm run build
      - run: cd vscode-extension && npm ci && node --check extension.js

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build twine
      - run: python -m build
      - run: python -m twine upload --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
